    <script>
      const installBanner = document.getElementById("install-banner");
      const installBannerText = document.getElementById("install-banner-text");
      const installBannerHint = document.getElementById("install-banner-hint");
      const installAppButton = document.getElementById("install-app-button");
      const dismissInstallButton = document.getElementById(
        "dismiss-install-button"
      );
      let deferredInstallPrompt = null;
      let fallbackBannerTimer = null;

      const isStandalone = () =>
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

      const isIos = () => /iphone|ipad|ipod/i.test(window.navigator.userAgent);
      const isSafari = () => {
        const ua = window.navigator.userAgent;
        return /safari/i.test(ua) && !/chrome|chromium|crios|edg|opr/i.test(ua);
      };

      const getInstallHelp = () => {
        if (isIos() && isSafari()) {
          return {
            text: "Own Your Secrets - Sync cottage encrypted secrets from any repo to any device",
            hint: "Tap Share, then choose Add to Home Screen.",
            buttonLabel: "Show Steps",
            oneClick: false,
          };
        }

        return {
          text: "Own Your Secrets - Sync cottage encrypted secrets from any repo to any device",
          hint: "If the install prompt does not appear, use your browser menu and choose Install App / Add to desktop / Add to Home Screen.",
          buttonLabel: "Show Steps",
          oneClick: false,
        };
      };

      const showInstallBanner = ({ oneClick, text, hint, buttonLabel }) => {
        if (!installBanner || isStandalone()) {
          return;
        }
        installBanner.style.display = "flex";
        if (installBannerText) {
          installBannerText.textContent = text;
        }
        if (installBannerHint) {
          installBannerHint.textContent = hint || "";
        }
        if (installAppButton) {
          installAppButton.disabled = !oneClick;
          installAppButton.textContent = buttonLabel;
        }
      };

      const hideInstallBanner = () => {
        if (installBanner) {
          installBanner.style.display = "none";
        }
      };

      const scheduleFallbackInstallBanner = () => {
        if (fallbackBannerTimer || isStandalone()) {
          return;
        }

        fallbackBannerTimer = window.setTimeout(() => {
          if (deferredInstallPrompt || isStandalone()) {
            return;
          }
          showInstallBanner(getInstallHelp());
        }, 1800);
      };

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        if (fallbackBannerTimer) {
          window.clearTimeout(fallbackBannerTimer);
          fallbackBannerTimer = null;
        }
        showInstallBanner({
          oneClick: true,
          text: "Own Your Secrets - Sync cottage encrypted secrets from any repo to any device",
          hint: "One click opens the browser install prompt.",
          buttonLabel: "Install App",
        });
      });

      window.addEventListener("appinstalled", () => {
        deferredInstallPrompt = null;
        hideInstallBanner();
      });

      installAppButton?.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          showInstallBanner(getInstallHelp());
          return;
        }

        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice?.outcome !== "accepted") {
          showInstallBanner({
            oneClick: true,
            text: "Own Your Secrets - Sync cottage encrypted secrets from any repo to any device",
            hint: "You can try again whenever you're ready.",
            buttonLabel: "Install App",
          });
        }
        deferredInstallPrompt = null;
      });

      dismissInstallButton?.addEventListener("click", hideInstallBanner);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .finally(scheduleFallbackInstallBanner);
        });

        scheduleFallbackInstallBanner();

      window.fs = new LightningFS("fs");
